<!DOCTYPE html>
<html lang=en>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Multi-column Tag Editor (with Search)</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            background-color: #121212;
            color: #e0e0e0;
        }

        .left,
        .right {
            padding: 10px;
            overflow-y: auto;
        }

        .left {
            width: 40%;
            border-right: 1px solid #444;
            display: flex;
            flex-direction: column;
        }

        .right {
            width: 60%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .topbar,
        .template-box,
        .footer-controls {
            background-color: #1e1e1e;
            padding: 10px;
            border-radius: 6px;
        }

        .topbar select {
            background-color: #2c2c2c;
            color: #e0e0e0;
            border: 1px solid #555;
            padding: 4px;
        }

        .category-buttons button,
        .template-box button {
            margin: 2px;
            background-color: #2c2c2c;
            color: #e0e0e0;
            border: 1px solid #555;
            border-radius: 4px;
            cursor: pointer;
            padding: 5px 10px;
        }

        .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            background-color: #1e1e1e;
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
            overflow-y: auto;
            scrollbar-gutter: stable;
        }

        .tag {
            padding: 5px 8px;
            background: #c2c2c2;
            border-radius: 4px;
            cursor: pointer;
        }

        .tag.selected {
            background: #1fce62;
            color: #000;
        }

        .tag-category h3 {
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
            color: #ffcc00;
        }

        .tag-subcategory h4 {
            margin: 8px 0 4px;
            font-size: 14px;
            font-weight: bold;
            color: #66ccff;
        }

        .output-box {
            border: 1px solid #555;
            background-color: #1e1e1e;
            padding: 5px;
            position: relative;
        }

        .output-box.selected {
            border: 2px solid #00BCD4;
        }

        .output-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 5px;
        }

        .output-tag {
            background: #4caf50;
            padding: 4px 6px;
            border-radius: 4px;
        }

        .output-tag span {
            margin-left: 4px;
            cursor: pointer;
            color: red;
        }

        .output-box textarea {
            width: 100%;
            height: 60px;
            resize: none;
            background-color: #333;
            color: #eee;
            border: none;
            border-radius: 4px;
            padding: 5px;
            font-size: 14px;
        }


        .output-controls button {
            margin-left: 5px;
        }

        .output-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 4px;
        }

        .move-buttons {
            display: flex;
            gap: 4px;
        }


        .template-box span {
            cursor: pointer;
            margin-left: 5px;
            color: red;
        }

        .footer-controls {
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            padding: 10px;
            background: #1e1e1e;
            border-radius: 6px;
        }

        .footer-controls>div {
            display: flex;
            gap: 10px;
        }

        #templateToggle {
            display: none;
        }

        .group-buttons button.active,
        .category-buttons button.active {
            background-color: #00bcd4;
            color: #000;
            border: 1px solid #00bcd4;
        }

        /* 搜尋輸入樣式 (保守、跟現有 UI 一致) */
        .search-input {
            background-color: #2c2c2c;
            color: #e0e0e0;
            border: 1px solid #555;
            padding: 6px 8px;
            border-radius: 4px;
            margin-left: 8px;
            min-width: 160px;
        }

        .search-wrapper button {
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .search-wrapper button:hover {
            opacity: 1;
        }

        /* === 修正搜尋框擠到下一行問題 === */
        .topbar {
            display: flex;
            align-items: center;
            flex-wrap: nowrap;
            gap: 6px;
            /* 控制語言選單與搜尋欄間距 */
        }

        .topbar label,
        .topbar select {
            flex-shrink: 0;
        }

        .topbar .search-wrapper {
            display: flex;
            align-items: center;
            flex: 1;
            /* 讓搜尋欄可自動壓縮而不換行 */
            min-width: 0;
            /* 關鍵：允許 flex 收縮 */
            position: relative;
        }

        .topbar .search-wrapper input[type="text"] {
            width: 100%;
            min-width: 180px;
            padding-right: 24px;
            /* 給右側✕留空 */
            box-sizing: border-box;
        }

        .topbar .search-wrapper button {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 14px;
            color: #666;
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .topbar .search-wrapper button:hover {
            opacity: 1;
        }



        /* 手機專用調整 */
        @media (max-width: 768px) {

            body {
                flex-direction: column;
                overflow-x: hidden;
            }

            .group-buttons {
                display: flex;
                flex-wrap: wrap;
                overflow-y: auto;
                line-height: 1.6em;
                max-height: calc(1.6em * 2 + 12px);
                min-height: calc(1.6em * 2 + 12px);
                margin-bottom: 6px;
                flex-shrink: 0;
                background: #1e1e1e;
                border-radius: 6px;
                padding: 6px;
            }

            .category-buttons {
                display: flex;
                flex-wrap: wrap;
                overflow-y: auto;
                line-height: 1.6em;
                max-height: calc(1.6em * 2 + 12px);
                min-height: calc(1.6em * 2 + 12px);
                margin-bottom: 6px;
                flex-shrink: 0;
                background: #1e1e1e;
                border-radius: 6px;
                padding: 6px;
            }

            .group-buttons button,
            .category-buttons button {
                margin: 2px;
                background-color: #2c2c2c;
                color: #e0e0e0;
                border: 1px solid #555;
                border-radius: 4px;
                cursor: pointer;
                height: 32px;
                line-height: 22px;
                padding: 0 8px;
                display: inline-flex;
                align-items: center;
                justify-content: center;
            }

            .left {
                width: 100% !important;
                max-width: 100% !important;
                box-sizing: border-box;
                max-height: 40vh;
                display: flex;
                flex-direction: column;
                flex-shrink: 0;
                min-height: 200px;
            }

            .tag-list {
                display: flex;
                flex-wrap: wrap;
                overflow-y: auto;
                line-height: 1.6em;
                max-height: calc(1.6em * 6.9);
                min-height: calc(1.6em * 6.9);
                flex-shrink: 0;
            }

            #templateToggle.mobile-only {
                display: block;
                background-color: #2c2c2c;
                color: #e0e0e0;
                border: 1px solid #555;
                border-radius: 4px;
                padding: 6px 10px;
                text-align: left;
                height: 38px;
            }

            .template-box {
                display: none;
                position: fixed;
                bottom: 70px;
                left: 5%;
                width: 90%;
                max-height: 60vh;
                overflow-y: auto;
                background: #1e1e1e;
                border: 1px solid #444;
                border-radius: 8px;
                padding: 10px;
                z-index: 1000;
            }

            #undoBtn {
                display: none;
            }

            .template-box.show {
                display: block;
            }

            .right {
                width: 100% !important;
                max-width: 100% !important;
                box-sizing: border-box;
                flex-grow: 1;
                max-height: 43.2vh;
                overflow-y: auto;
                padding-right: 0;
                padding-left: 0;
                padding-bottom: 90px;
            }

            .footer-controls {
                position: fixed;
                bottom: 0;
                left: 0;
                width: 100%;
                background: #1e1e1e;
                display: flex;
                flex-direction: column;
                gap: 6px;
                padding: 10px;
                z-index: 999;
            }

            .footer-row1,
            .footer-row2 {
                display: flex;
                align-items: center;
                gap: 8px;
                width: 100%;
                box-sizing: border-box;
                padding: 0 10px;
            }

            #languageSelect,
            #templateToggle.mobile-only {
                width: 80px;
                min-width: 80px;
                max-width: 80px;
                box-sizing: border-box;
            }

            .footer-row1 .right-buttons button,
            .footer-row2 .right-buttons button {
                width: 120px;
                min-width: 120px;
                max-width: 120px;
                text-align: center;
                flex-shrink: 0;
            }

            .footer-row1 .right-buttons button,
            .footer-row2 .right-buttons button {
                flex: 1 1 45%;
                max-width: 120px;
                text-align: center;
            }

            .topbar label[for="languageSelect"] {
                display: none !important;
            }

            .footer-controls #languageSelect {
                -webkit-appearance: none;
                appearance: none;
                background-color: #2c2c2c;
                color: #e0e0e0;
                border: 1px solid #555;
                padding: 6px 8px;
                border-radius: 4px;
                font-size: 14px;
            }

            /* 手機時 search input 放在 groupButtons 上方：用 .mobile-search 區塊 */
            .topbar .search-input {
                display: none;
            }

            .mobile-search {
                display: block;
                margin-bottom: 6px;
            }

        }

        /* 已儲存的模板 - 橫式排列 */
        #templateList {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        #templateList .template-item {
            flex: 0 0 auto;
            min-width: 150px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            background: #f9f9f9;
            text-align: center;
            cursor: pointer;
            transition: background 0.2s;
        }

        #templateList .template-item:hover {
            background: #eaeaea;
        }
    </style>
</head>

<body>
    <!-- 左邊欄 -->
    <div class="left">
        <div class="topbar">
            <label for="languageSelect">介面語言:</label>
            <select id="languageSelect">
                <option value=zh>中文</option>
                <option value=en>English</option>
                <option value=jp>日本語</option>
            </select>

            <!-- 搜尋輸入_桌機 / 預設放在語言選單旁 -->
            <input id="searchInput" class="search-input" placeholder="搜尋 tag 或 value_按 Enter" />

            <!-- 📂 模板鍵要放在這裡，緊貼語言選單下面 -->
            <button id="templateToggle" class="mobile-only">📂 模板</button>
        </div>

        <!-- 手機時：把搜尋放在大類上方_這個區塊只在手機時顯示 -->
        <div id="mobileSearchContainer" class="mobile-search" style="display:none;">
            <input id="mobileSearchInput" class="search-input" placeholder="搜尋 tag 或 value_按 Enter" />
        </div>

        <!-- 新增大類按鈕列_僅手機版會顯示 -->
        <div class="group-buttons" id="groupButtons"></div>
        <div class="category-buttons" id="categories"></div>
        <div class="tag-list" id="tagList"></div>


        <div class="template-box">
            <input type="text" id="templateName" placeholder="模板名稱">
            <button onclick="saveTemplate()">💾 儲存模板</button>
            <button onclick="downloadTemplates()">⬇ 下載模板</button>
            <input type="file" id="uploadInput" onchange="uploadTemplates()" style="margin-top: 6px;">
            <div id="templateList"></div>
        </div>
    </div>

    <!-- 右邊欄 -->
    <div class="right">
        <div id="outputs"></div>
        <div class="footer-controls">
            <div class="left-buttons">
                <button onclick="addOutput()">➕ Add Output</button>
                <button onclick="removeLast()">➖ Remove Last</button>
                <button onclick="importPrompt()">📥 Import Prompt</button>
            </div>
            <div class="right-buttons">
                <button id="undoBtn" onclick="undoLast()">↩️</button>
                <button onclick="clearAll()">🗑️ Clear All</button>
                <button onclick="copyAll()">📋 Copy All</button>
            </div>
        </div>
    </div>

function parsePrompt(text) {

    pushUndoState();

    // 以 BREAK 分段（大小寫都接受）
    const sections = text.split(/\bBREAK\b/i);

    outputData = [];

    sections.forEach(section => {

        const values = section
            .split(",")
            .map(v => v.trim())
            .filter(v => v.length);

        const tags = values.map(v => {

            for (let cat in jsonData) {

                const match = jsonData[cat].find(t => t.value === v);

                if (match) return match;
            }

            // 找不到就建立自訂 Tag
            return {
                label:{
                    zh:v,
                    en:v,
                    jp:v
                },
                value:v
            };

        });

        outputData.push(tags);

    });

    outputsDiv.innerHTML = "";

    outputData.forEach((_,i)=>createOutputBox(i));

    updateAllTagHighlight();
}

        /* -------------------------
           output / tag selection logic
        ------------------------- */
        function pushUndoState() {
            undoStack.push(JSON.parse(JSON.stringify(outputData)));
            if (undoStack.length > UNDO_LIMIT) {
                undoStack.shift();
            }
        }

        function undoLast() {
            if (!undoStack.length) return;

            outputData = undoStack.pop();
            outputsDiv.innerHTML = '';

            outputData.forEach((_, i) => createOutputBox(i));

            currentOutputIndex = Math.min(
                currentOutputIndex,
                outputData.length - 1
            );

            updateOutputHighlight();
        }

        function autoAdjustWeight(value, delta) {
            const found = outputData.findIndex(arr => arr.some(t => t.value === value || (typeof t.value === 'string' && t.value.startsWith(`${value}:`))));
            if (found !== -1) {
                currentOutputIndex = found;
                updateOutputHighlight();
                adjustTagWeight(value, delta);
                return true;
            }
            return false;
        }

        function adjustTagWeight(value, delta) {
            pushUndoState();

            const tag = outputData[currentOutputIndex]
                .find(t => t.value === value ||
                    (typeof t.value === 'string' && t.value.startsWith(`${value}:`)));

            if (!tag) return;

            const currentWeight = tag.weight || 1.0;
            const newWeight = Math.max(
                0.1,
                Math.min(2.0, +(currentWeight + delta).toFixed(1))
            );

            tag.weight = newWeight;
            updateOutput(currentOutputIndex);
            updateAllTagHighlight();
        }

        function extractWeightedValue(raw) {
            // 僅處理 (tag:1.2) 這種形式
            const m = raw.match(/^\((.+?):([0-9.]+)\)$/);
            if (!m) return null;
            return m[1].trim(); // 只回傳 tag value，不管 weight
        }

        function parseWeightedTag(raw) {
            const m = raw.match(/^\((.+?):([0-9.]+)\)$/);
            if (!m) return null;

            return {
                value: m[1].trim(),
                weight: parseFloat(m[2])
            };
        }

        function toggleTag(el, tagObj) {
            const foundIndex = outputData.findIndex(arr =>
                arr.some(t => t.value === tagObj.value)
            );

            // if tag is present in a different output, switch to that output and remove it there
            if (foundIndex !== -1 && foundIndex !== currentOutputIndex) {
                currentOutputIndex = foundIndex;
                updateOutputHighlight();
                removeTag(foundIndex, tagObj.value);
                return;
            }

            const isSelected = el.classList.toggle('selected');
            if (isSelected) {
                addTagToCurrent(tagObj);
            } else {
                removeTag(currentOutputIndex, tagObj.value);
            }
        }

        function moveOutput(index, direction) {
            const newIndex = index + direction;

            if (newIndex < 0 || newIndex >= outputData.length) return;

            pushUndoState();

            // 交換資料
            const temp = outputData[index];
            outputData[index] = outputData[newIndex];
            outputData[newIndex] = temp;

            // 更新目前選中 index
            currentOutputIndex = newIndex;

            // 重建整個 UI
            outputsDiv.innerHTML = '';
            outputData.forEach((_, i) => createOutputBox(i));

            updateOutputHighlight();
            updateAllTagHighlight();
        }


        function createOutputBox(index) {
            const box = document.createElement('div');
            box.className = 'output-box';
            box.onclick = () => {
                currentOutputIndex = index;
                updateOutputHighlight();
            };

            const tagDisplay = document.createElement('div');
            tagDisplay.className = 'output-tags';

            const textarea = document.createElement('textarea');
            textarea.oninput = () => {
                pushUndoState();

                const values = textarea.value
                    .split(',')
                    .map(t => t.trim())
                    .filter(Boolean);

                outputData[index] = values.map(raw => {
                    // ① 嘗試解析 (tag:1.2)
                    const parsed = parseWeightedTag(raw);
                    const lookupValue = parsed ? parsed.value : raw;

                    // ② 用乾淨的 value 去找 tag
                    for (let cat in jsonData) {
                        const match = jsonData[cat].find(t => t.value === lookupValue);
                        if (match) {
                            const tagObj = JSON.parse(JSON.stringify(match));
                            // ✅ 如果有解析到 weight，就存起來
                            if (parsed) tagObj.weight = parsed.weight;
                            return tagObj;
                        }
                    }

                    // ③ 找不到 tag → 退化_你說 OK
                    const fallback = {
                        label: { zh: lookupValue, en: lookupValue, jp: lookupValue },
                        value: lookupValue
                    };
                    if (parsed) fallback.weight = parsed.weight;
                    return fallback;
                });


                renderTagDisplay(index);
                updateAllTagHighlight();
            };

            const controls = document.createElement('div');
            controls.className = 'output-controls';

            // 📋 Copy
            const copyBtn = document.createElement('button');
            copyBtn.textContent = '📋';
            copyBtn.onclick = (e) => {
                e.stopPropagation();
                navigator.clipboard.writeText(textarea.value);
            };

            // 🗑️ Clear
            const clearBtn = document.createElement('button');
            clearBtn.textContent = '🗑️';
            clearBtn.onclick = (e) => {
                e.stopPropagation();
                pushUndoState();
                outputData[index] = [];
                updateOutput(index);
                updateAllTagHighlight();
            };

            // ⬆️ 上移
            const upBtn = document.createElement('button');
            upBtn.textContent = '⬆️';
            upBtn.onclick = (e) => {
                e.stopPropagation();
                moveOutput(index, -1);
            };

            // ⬇️ 下移
            const downBtn = document.createElement('button');
            downBtn.textContent = '⬇️';
            downBtn.onclick = (e) => {
                e.stopPropagation();
                moveOutput(index, 1);
            };

            const moveWrap = document.createElement('div');
            moveWrap.className = 'move-buttons';
            moveWrap.appendChild(upBtn);
            moveWrap.appendChild(downBtn);

            const leftWrap = document.createElement('div');
            leftWrap.appendChild(copyBtn);
            leftWrap.appendChild(clearBtn);

            controls.appendChild(leftWrap);
            controls.appendChild(moveWrap);



            box.appendChild(tagDisplay);
            box.appendChild(textarea);
            box.appendChild(controls);
            outputsDiv.appendChild(box);

            updateOutput(index);
        }


        function normalizeValue(v) {
            if (v === null || v === undefined) return '';
            return String(v).trim().replace(/^,+|,+$/g, '').replace(/^[\(\[]+|[\)\]]+$/g, '').toLowerCase();
        }

        function renderTagDisplay(index) {
            const tagContainer = outputsDiv.children[index].querySelector('.output-tags');
            tagContainer.innerHTML = '';

            outputData[index].forEach((tag, i) => {
                const tagValueRaw = (tag && typeof tag === 'object') ? tag.value : tag;
                const normValue = normalizeValue(tagValueRaw);

                let displayText = null;
                let foundTagObj = null;

                outer:
                for (const group of rawData) {
                    if (!group || !group.groups) continue;
                    for (const sub of group.groups) {
                        if (!sub || !Array.isArray(sub.tags)) continue;
                        for (const t of sub.tags) {
                            if (!t) continue;
                            const normT = normalizeValue(t.value);
                            if (normT === normValue) {
                                foundTagObj = t;
                                break outer;
                            }
                        }
                    }
                }

                if (tag && typeof tag === 'object' && tag.label && tag.label[currentLang]) {
                    displayText = tag.label[currentLang];
                } else if (foundTagObj && foundTagObj[currentLang]) {
                    displayText = foundTagObj[currentLang];
                } else if (tagValueRaw != null) {
                    displayText = String(tagValueRaw);
                } else {
                    displayText = '';
                }

                const tagEl = document.createElement('div');
                tagEl.className = 'output-tag';

                // ✅ 點擊 output TAG → 反向定位
                tagEl.onclick = () => {
                    jumpToTag(tagValueRaw);
                };

                const safeValue = String(tagValueRaw).replace(/'/g, "\\'");
                tagEl.innerHTML = `${displayText}
  <span onclick="event.stopPropagation(); removeTag(${index}, '${safeValue}')">✕</span>
`;

                tagContainer.appendChild(tagEl);
            });
        }



        function removeTag(index, value) {
            pushUndoState();
            outputData[index] = outputData[index].filter(t => t.value !== value);
            updateOutput(index);
            updateAllTagHighlight();
        }


        function updateOutput(index) {
            const text = outputData[index].map(t => {
                if (t.weight && t.weight !== 1.0) {
                    return `(${t.value}:${t.weight}), `;
                }
                return `${t.value}, `;
            }).join('');
            const textarea = outputsDiv.children[index].querySelector('textarea');
            if (textarea) textarea.value = text;
            renderTagDisplay(index);
            updateOutputHighlight();
        }

        function updateOutputHighlight() {
            document.querySelectorAll('.output-box').forEach((el, i) => {
                el.classList.toggle('selected', i === currentOutputIndex);
            });
            updateAllTagHighlight();
        }

        function updateAllTagHighlight() {
            const selected = new Set(outputData.flat().map(t => t.value));
            document.querySelectorAll('.tag').forEach(el => {
                el.classList.toggle('selected', selected.has(el.dataset.value));
            });
        }

        function addTagToCurrent(tagObj) {
            pushUndoState();

            if (!outputData[currentOutputIndex]) {
                outputData[currentOutputIndex] = [];
            }

            const exists = outputData[currentOutputIndex]
                .some(t => t.value === tagObj.value);

            if (!exists) {
                const cleanTag = JSON.parse(JSON.stringify(tagObj));
                delete cleanTag.weight;
                outputData[currentOutputIndex].push(cleanTag);
                updateOutput(currentOutputIndex);
                updateAllTagHighlight();
            }
        }


        function copyAll() {
            const allText = outputData.map(arr =>
                arr.map(t => {
                    if (t.weight && t.weight !== 1) {
                        return `(${t.value}:${t.weight}), `;
                    } else {
                        return `${t.value}, `;
                    }
                }).join('')
            ).join('\nBREAK\n');

            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(allText).catch(err => {
                    console.error("Clipboard API 失敗:", err);
                });
            } else {
                const textarea = document.createElement("textarea");
                textarea.value = allText;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand("copy");
                document.body.removeChild(textarea);
            }
        }

        function clearAll() {
            pushUndoState();
            for (let i = 0; i < outputData.length; i++) {
                outputData[i] = [];
                updateOutput(i);
            }
            updateAllTagHighlight();
        }


        function addOutput() {
            const newIndex = outputData.length;
            outputData.push([]);
            createOutputBox(newIndex);
        }
        function removeLast() {
            if (outputData.length > 1) {
                outputsDiv.removeChild(outputsDiv.lastChild);
                outputData.pop();
                if (currentOutputIndex >= outputData.length) {
                    currentOutputIndex = outputData.length - 1;
                }
                updateAllTagHighlight();
            }
        }

        // === 🔍 即時搜尋系統_桌機與手機共用 ===

        // 延遲觸發函式_避免輸入時過度重繪
        function debounceSearch(func, delay = 300) {
            let timer = null;
            return (...args) => {
                clearTimeout(timer);
                timer = setTimeout(() => func(...args), delay);
            };
        }

        // === 🔍 即時搜尋 + 清除鍵版本 ===

        // 延遲觸發函式_防止輸入時過度重繪
        function debounceSearch(func, delay = 300) {
            let timer = null;
            return (...args) => {
                clearTimeout(timer);
                timer = setTimeout(() => func(...args), delay);
            };
        }

        // 搜尋邏輯：輸入即觸發
        const handleSearchSubmit = debounceSearch(() => {
            const desktopInput = document.getElementById('searchInput');
            const mobileInput = document.getElementById('mobileSearchInput');
            const q =
                (desktopInput && desktopInput.value)
                    ? desktopInput.value.trim()
                    : (mobileInput && mobileInput.value ? mobileInput.value.trim() : '');

            renderTags(currentCategory, q || null);
        }, 300);

        // 建立一個帶「❌ 清除」按鈕的搜尋框容器
        function wrapSearchInput(input) {
            if (!input || input.dataset.hasWrapper) return;

            const wrapper = document.createElement('div');
            wrapper.className = 'search-wrapper';
            wrapper.style.position = 'relative';
            wrapper.style.display = 'inline-block';
            wrapper.style.width = '100%';

            input.parentNode.insertBefore(wrapper, input);
            wrapper.appendChild(input);

            const clearBtn = document.createElement('button');
            clearBtn.textContent = '✕';
            clearBtn.title = '清除搜尋';
            clearBtn.style.position = 'absolute';
            clearBtn.style.right = '6px';
            clearBtn.style.top = '50%';
            clearBtn.style.transform = 'translateY(-50%)';
            clearBtn.style.border = 'none';
            clearBtn.style.background = 'transparent';
            clearBtn.style.cursor = 'pointer';
            clearBtn.style.fontSize = '14px';
            clearBtn.style.color = '#666';
            clearBtn.style.display = 'none';
            wrapper.appendChild(clearBtn);

            input.dataset.hasWrapper = 'true';
            input.addEventListener('input', () => {
                clearBtn.style.display = input.value ? 'block' : 'none';
            });

            clearBtn.addEventListener('click', (e) => {
                e.preventDefault();
                input.value = '';
                clearBtn.style.display = 'none';
                handleSearchSubmit();
            });
        }

        // 同步桌機與手機搜尋框 + 綁定即時搜尋
        function syncSearchInputs() {
            const desktopInput = document.getElementById('searchInput');
            const mobileInput = document.getElementById('mobileSearchInput');
            if (!desktopInput || !mobileInput) return;

            // 包裝兩個搜尋欄，加上清除鍵
            wrapSearchInput(desktopInput);
            wrapSearchInput(mobileInput);

            // 同步兩邊的輸入
            desktopInput.addEventListener('input', () => {
                mobileInput.value = desktopInput.value;
                handleSearchSubmit();
            });
            mobileInput.addEventListener('input', () => {
                desktopInput.value = mobileInput.value;
                handleSearchSubmit();
            });

            // 支援 ESC 鍵清除搜尋
            const clearBoth = () => {
                desktopInput.value = '';
                mobileInput.value = '';
                handleSearchSubmit();
            };
            desktopInput.addEventListener('keydown', (e) => { if (e.key === 'Escape') clearBoth(); });
            mobileInput.addEventListener('keydown', (e) => { if (e.key === 'Escape') clearBoth(); });
        }


        // 修復手機模板鍵行為_被移動到 footer 時也能作用
        function bindTemplateToggle() {
            const toggle = document.getElementById('templateToggle');
            const templateBox = document.querySelector('.template-box');
            if (!toggle || !templateBox) return;
            toggle.addEventListener('click', (e) => {
                e.stopPropagation();
                templateBox.classList.toggle('show');
            });
            document.addEventListener('click', (ev) => {
                if (!templateBox.classList.contains('show')) return;
                if (ev.target === toggle || templateBox.contains(ev.target)) return;
                templateBox.classList.remove('show');
            });
        }

        // 初始化
        document.addEventListener("DOMContentLoaded", () => {
            categoriesDiv = document.getElementById('categories');
            tagListDiv = document.getElementById('tagList');
            outputsDiv = document.getElementById('outputs');
            languageSelect = document.getElementById('languageSelect');
            templateList = document.getElementById('templateList');

            loadFromLocal();
            syncSearchInputs();
            bindTemplateToggle();

            if (window.innerWidth <= 768) {
                renderGroupButtons();
                renderCategoryButtons_mobile();
                renderTags(currentCategory);
            } else {
                renderCategoryButtons();
                renderTags(currentCategory);
            }

            // 建立三個輸出框
            for (let i = 0; i < 3; i++) {
                outputData.push([]);
                createOutputBox(i);
            }
            renderTemplateList();

            languageSelect.onchange = () => {
                currentLang = languageSelect.value;
                if (window.innerWidth <= 768) {
                    renderGroupButtons();
                    renderCategoryButtons_mobile();
                    renderTags(currentCategory);
                } else {
                    renderCategoryButtons();
                    renderTags(currentCategory);
                }
                outputData.forEach((_, i) => renderTagDisplay(i));
                updateOutputHighlight();
            };
        });
    </script>
</body>

</html>
